<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Daily Report | DrillOps</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#eef2f6;--panel:#fff;--border:#d8e0ea;--text:#1f2d3d;--muted:#687789;--accent:#1f5f8b;--green:#27ae60;--red:#dc2626;--yellow:#d97706;--shadow:0 1px 2px rgba(15,23,42,0.05);--font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;}
main{max-width:1540px;margin:0 auto;padding:18px;}
.report-detail{background:var(--panel);border:1px solid var(--border);border-radius:7px;box-shadow:var(--shadow);overflow:hidden;}
.report-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;padding:15px 16px;border-bottom:1px solid var(--border);background:#f8fafc;}
.title{font-size:16px;font-weight:800;margin-bottom:6px;}
.meta{display:flex;gap:8px;flex-wrap:wrap;color:var(--muted);font-size:12px;}
.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;}
button,.btn{display:inline-flex;align-items:center;justify-content:center;padding:8px 13px;border:1px solid #c9d3df;background:#fff;color:#324256;border-radius:6px;font-family:var(--font);font-weight:650;font-size:12px;text-decoration:none;cursor:pointer;}
button:hover,.btn:hover{background:#eef3f7;border-color:#9fb0c2;color:#174d72;}
select,textarea{border:1px solid #c9d3df;background:#fff;color:#324256;border-radius:6px;font-family:var(--font);font-size:12px;}
select{padding:8px 10px;font-weight:650;}
textarea{width:100%;min-height:72px;padding:9px 10px;resize:vertical;}
.body{padding:16px;}
.kpis{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin-bottom:16px;}
.kpi{border:1px solid var(--border);border-radius:7px;background:#fff;padding:11px 12px;}
.kpi .label,.subtitle{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);}
.kpi .value{font-size:18px;font-weight:800;margin-top:5px;}
.subtitle{margin:16px 0 8px;}
.timeline{border:1px solid var(--border);border-radius:7px;background:#fbfcfd;padding:12px;margin-bottom:16px;overflow:hidden;}
.timeline-tools{display:flex;justify-content:flex-end;gap:6px;margin-bottom:8px;}
.timeline-tools button{padding:5px 9px;font-size:11px;}
.timeline-scroll{overflow-x:auto;overflow-y:hidden;padding-bottom:7px;scrollbar-color:#87909c #e8edf3;scrollbar-width:thin;}
.timeline-scroll::-webkit-scrollbar{height:10px;}
.timeline-scroll::-webkit-scrollbar-track{background:#e8edf3;border-radius:999px;}
.timeline-scroll::-webkit-scrollbar-thumb{background:#87909c;border-radius:999px;}
.timeline-inner{min-width:1200px;}
.timeline-scale{position:relative;height:26px;border-bottom:1px solid var(--border);margin-bottom:8px;}
.timeline-tick{position:absolute;top:0;transform:translateX(-50%);font-family:var(--mono);font-size:10px;color:var(--muted);}
.timeline-track{position:relative;height:42px;background:repeating-linear-gradient(90deg,#fff 0,#fff 79px,#edf1f5 80px);border:1px solid #dfe5ec;border-radius:6px;overflow:hidden;}
.timeline-block{position:absolute;top:6px;height:28px;border-radius:4px;color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;padding:0 7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;box-shadow:0 1px 2px rgba(15,23,42,0.14);}
.notes{border:1px solid var(--border);border-radius:7px;background:#fbfcfd;padding:12px;line-height:1.5;max-height:190px;overflow:auto;}
.grid{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:14px;}
.table-wrap{background:#fff;border:1px solid var(--border);border-radius:7px;overflow:hidden;box-shadow:var(--shadow);}
.scroll{overflow:auto;max-height:360px;}
table{width:100%;border-collapse:collapse;font-size:12.5px;}
thead th{position:sticky;top:0;background:#f1f4f7;color:#647285;text-transform:uppercase;letter-spacing:0.08em;font-size:10px;font-weight:800;padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);}
tbody td{padding:9px 12px;border-bottom:1px solid #edf0f3;color:#334155;vertical-align:top;}
.code{font-family:var(--mono);font-size:11px;color:#174d72;font-weight:700;}
.flag{display:inline-flex;border-radius:999px;background:#fff7e6;color:#a05a00;border:1px solid #f4d39b;padding:3px 8px;font-size:10px;font-weight:800;margin-top:8px;}
.approval-panel{border:1px solid var(--border);border-radius:7px;background:#fbfcfd;padding:12px;margin-bottom:16px;}
.approval-row{display:grid;grid-template-columns:220px minmax(0,1fr) auto;gap:10px;align-items:start;}
.approval-reason{display:none;}
.approval-reason.open{display:block;}
.approval-status{display:inline-flex;align-items:center;border-radius:999px;padding:3px 9px;font-size:10px;font-weight:800;margin-left:8px;}
.approval-status.approved{background:#ecfdf3;color:#147a39;border:1px solid #bae7ca;}
.approval-status.rejected{background:#fff1f2;color:#b42335;border:1px solid #ffc7cd;}
.log-list{display:flex;flex-direction:column;gap:10px;margin-top:10px;max-height:170px;overflow:auto;}
.log-item{display:grid;grid-template-columns:18px minmax(0,1fr) auto;gap:8px;align-items:start;color:#334155;}
.log-icon{font-size:13px;line-height:1.3;}
.log-time{font-size:11px;color:var(--muted);white-space:nowrap;}
.log-note{grid-column:2 / -1;border:1px solid #d8e0ea;border-radius:6px;background:#fff;padding:8px 10px;color:#526273;}
.empty{padding:22px;color:var(--muted);}
@media(max-width:1000px){main{padding:10px}.kpis{grid-template-columns:repeat(2,minmax(0,1fr))}.grid{grid-template-columns:1fr}}
@media(max-width:650px){.kpis{grid-template-columns:1fr}.report-head{flex-direction:column}.actions{justify-content:flex-start}}
</style>
</head>
<body>
<main>
  <div class="report-detail">
    <div class="report-head">
      <div>
        <div class="title" id="title">Daily report</div>
        <div class="meta" id="meta"></div>
        <div id="flags"></div>
        <span class="approval-status" id="approval-status" style="display:none;"></span>
      </div>
      <div class="actions">
        <button id="pdf-btn" type="button">PDF</button>
        <a class="btn" href="index.html">Reports list</a>
        <button type="button" onclick="window.close()">Close tab</button>
      </div>
    </div>
    <div class="body">
      <div class="approval-panel">
        <div class="approval-row">
          <div>
            <div class="subtitle" style="margin:0 0 7px;">Client Decision</div>
            <select id="approval-select">
              <option value="">Select decision</option>
              <option value="approved">Approve report</option>
              <option value="rejected">Reject report</option>
            </select>
          </div>
          <div class="approval-reason" id="approval-reason-wrap">
            <div class="subtitle" style="margin:0 0 7px;">Reason</div>
            <textarea id="approval-reason" placeholder="Enter why this report was approved or rejected"></textarea>
          </div>
          <button type="button" id="approval-save" style="margin-top:18px;">Save</button>
        </div>
        <div class="subtitle">Log</div>
        <div class="log-list" id="approval-log"></div>
      </div>
      <div class="kpis">
        <div class="kpi"><div class="label">Depth</div><div class="value" id="kpi-depth">--</div></div>
        <div class="kpi"><div class="label">Duration</div><div class="value" id="kpi-duration">--</div></div>
        <div class="kpi"><div class="label">Cost</div><div class="value" id="kpi-cost">--</div></div>
        <div class="kpi"><div class="label">Cost / m</div><div class="value" id="kpi-costm">--</div></div>
        <div class="kpi"><div class="label">Activities</div><div class="value" id="kpi-activities">--</div></div>
      </div>
      <div class="subtitle">Shift Timeline</div>
      <div class="timeline" id="timeline"></div>
      <div class="subtitle">Report Notes</div>
      <div class="notes" id="notes"></div>
      <div class="subtitle">Activities</div>
      <div class="table-wrap" style="margin-bottom:14px;">
        <div class="scroll">
          <table><thead><tr><th>Time</th><th>Code</th><th>Duration</th><th>Depth</th><th>Notes</th><th>Cost</th></tr></thead><tbody id="activity-body"></tbody></table>
        </div>
      </div>
      <div class="grid">
        <div>
          <div class="subtitle">Consumables</div>
          <div class="table-wrap"><table><thead><tr><th>Item</th><th>Qty</th><th>Unit</th><th>Total</th></tr></thead><tbody id="consumables-body"></tbody></table></div>
        </div>
        <div>
          <div class="subtitle">Personnel</div>
          <div class="table-wrap"><table><thead><tr><th>Name</th><th>Role</th><th>Hours</th></tr></thead><tbody id="crew-body"></tbody></table></div>
        </div>
      </div>
    </div>
  </div>
</main>
<script>
const API=window.location.hostname==='localhost'||window.location.hostname==='127.0.0.1'?'http://localhost:8000':'https://api.drillops.com.au';
const params=new URLSearchParams(window.location.search);
const contractor=params.get('contractor')||'Allianz Drilling';
const reportDate=params.get('date')||'';
const hole=params.get('hole')||'';
const source=params.get('source')||'';
const title=params.get('title')||'Daily report';
const approvalKey=['drillops-report-approval',contractor,reportDate,hole,source].join('|');
const CAT_COLORS={'Productive Drilling':'#27ae60','Tripping Rods':'#3498db','Circulation':'#9b59b6','Repairs':'#e74c3c','Standby / Delays':'#f39c12','Travel':'#7f8c8d','Safety & Admin':'#1abc9c','Other':'#555e6b'};
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmt(v,d=2){if(v==null||v==='')return'';const n=parseFloat(v);return isNaN(n)?'':n.toFixed(d);}
function cur(v){return '$'+(parseFloat(v)||0).toLocaleString('en-AU',{minimumFractionDigits:2,maximumFractionDigits:2});}
function parseDurationHours(value){if(value==null||value==='')return 0;const s=String(value).trim();if(!s)return 0;if(s.includes(':')){const p=s.split(':').map(x=>parseFloat(x)||0);return (p[0]||0)+((p[1]||0)/60);}const n=parseFloat(s);return isNaN(n)?0:n;}
function parseClockMinutes(value){if(!value)return null;let s=String(value).trim().replace(/\./g,':');if(/^\d{3,4}$/.test(s)){s=s.padStart(4,'0');return parseInt(s.slice(0,2))*60+parseInt(s.slice(2));}const m=s.match(/^(\d{1,2}):(\d{2})/);if(!m)return null;return parseInt(m[1])*60+parseInt(m[2]);}
function clockLabel(mins){mins=((mins%1440)+1440)%1440;const h=Math.floor(mins/60),m=mins%60;return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');}
function activityCategory(row){const text=((row.code||'')+' '+(row.notes||'')).toLowerCase();if(text.includes('drill')||text.includes('core')||text.includes('chip'))return 'Productive Drilling';if(text.includes('trip')||text.includes('rod'))return 'Tripping Rods';if(text.includes('flush')||text.includes('circul')||text.includes('water')||text.includes('lost'))return 'Circulation';if(text.includes('repair')||text.includes('breakdown'))return 'Repairs';if(text.includes('standby')||text.includes('fatigue')||text.includes('wait')||text.includes('delay')||text.includes('no access'))return 'Standby / Delays';if(text.includes('travel'))return 'Travel';if(text.includes('safety')||text.includes('prestart')||text.includes('meeting')||text.includes('admin'))return 'Safety & Admin';return 'Other';}
async function fetchJson(url){const res=await fetch(url,{signal:AbortSignal.timeout(25000)});if(!res.ok)throw new Error('HTTP '+res.status);return res.json();}
async function loadReport(){
  document.getElementById('title').textContent=title;
  document.title=title+' | DrillOps';
  initApprovalControls();
  const actParams=new URLSearchParams({contractor});
  if(reportDate)actParams.set('dates',reportDate);
  if(hole)actParams.set('holes',hole);
  const relatedParams=new URLSearchParams({contractor});
  if(reportDate)relatedParams.set('dates',reportDate);
  try{
    let rows=await fetchJson(API+'/activities?'+actParams.toString());
    if(source)rows=rows.filter(r=>(r.source_file||'')===source);
    const consumables=await fetchJson(API+'/consumables?'+relatedParams.toString()).catch(()=>[]);
    const crew=await fetchJson(API+'/crew?'+relatedParams.toString()).catch(()=>[]);
    renderReport(rows,consumables,crew);
  }catch(e){
    document.getElementById('activity-body').innerHTML='<tr><td colspan="6" class="empty">Could not load report: '+esc(e.message)+'</td></tr>';
  }
}
function getApprovalRecord(){
  try{return JSON.parse(localStorage.getItem(approvalKey)||'null')||{status:'',reason:'',log:[]};}
  catch(e){return {status:'',reason:'',log:[]};}
}
function setApprovalRecord(record){
  localStorage.setItem(approvalKey,JSON.stringify(record));
}
function initApprovalControls(){
  const select=document.getElementById('approval-select');
  const reasonWrap=document.getElementById('approval-reason-wrap');
  const reason=document.getElementById('approval-reason');
  const save=document.getElementById('approval-save');
  const record=getApprovalRecord();
  select.value=record.status||'';
  reason.value=record.reason||'';
  reasonWrap.classList.toggle('open',!!select.value);
  select.addEventListener('change',function(){
    reasonWrap.classList.toggle('open',!!select.value);
    reason.placeholder=select.value==='approved'?'Enter why this report is approved':'Enter why this report is rejected';
    if(select.value)reason.focus();
  });
  save.addEventListener('click',saveApprovalDecision);
  renderApprovalStatus(record);
  renderApprovalLog(record);
}
function saveApprovalDecision(){
  const select=document.getElementById('approval-select');
  const reason=document.getElementById('approval-reason');
  const status=select.value;
  const why=reason.value.trim();
  if(!status){alert('Select approve or reject first.');return;}
  if(!why){alert('Enter a reason before saving.');reason.focus();return;}
  const record=getApprovalRecord();
  const label=status==='approved'?'Approved':'Rejected';
  const entry={status:status,reason:why,at:new Date().toISOString(),by:'Client'};
  record.status=status;
  record.reason=why;
  record.log=[entry].concat(record.log||[]);
  setApprovalRecord(record);
  renderApprovalStatus(record);
  renderApprovalLog(record);
  reason.value='';
  reason.placeholder=label+' reason saved. Add another note if needed.';
}
function renderApprovalStatus(record){
  const badge=document.getElementById('approval-status');
  if(!record.status){badge.style.display='none';badge.textContent='';badge.className='approval-status';return;}
  badge.style.display='inline-flex';
  badge.className='approval-status '+record.status;
  badge.textContent=record.status==='approved'?'Approved':'Rejected';
  document.getElementById('approval-select').value=record.status;
}
function renderApprovalLog(record){
  const log=document.getElementById('approval-log');
  const items=record.log||[];
  if(!items.length){log.innerHTML='<div class="empty" style="padding:8px 0;">No approval decisions recorded.</div>';return;}
  log.innerHTML=items.map(function(item){
    const approved=item.status==='approved';
    const icon=approved?'✓':'✕';
    const action=approved?'Approved':'Rejected';
    const when=new Date(item.at).toLocaleString('en-AU',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
    return '<div class="log-item">'
      +'<div class="log-icon" style="color:'+(approved?'#147a39':'#b42335')+'">'+icon+'</div>'
      +'<div><strong>'+esc(item.by||'Client')+'</strong> '+action.toLowerCase()+' the report.</div>'
      +'<div class="log-time">'+esc(when)+'</div>'
      +'<div class="log-note">'+esc(item.reason||'')+'</div>'
      +'</div>';
  }).join('');
}
function renderReport(rows,consumables,crew){
  rows=(rows||[]).slice().sort((a,b)=>(parseClockMinutes(a.time_from)||0)-(parseClockMinutes(b.time_from)||0));
  const cost=rows.reduce((s,r)=>s+(parseFloat(r.line_cost)||0),0);
  const metres=rows.reduce((s,r)=>s+(parseFloat(r.total_metres)||0),0);
  const hours=rows.reduce((s,r)=>s+parseDurationHours(r.total_time),0);
  const first=rows[0]||{};
  const driller=crew.filter(c=>String(c.role||'').toLowerCase().includes('drill')&&(!hole||c.hole_num===hole)).map(c=>c.name)[0]||'';
  document.getElementById('meta').innerHTML=[reportDate,hole?'Hole '+hole:'',first.drill_rig?'Rig '+first.drill_rig:'',first.shift||'',driller].filter(Boolean).map(v=>'<span>'+esc(v)+'</span>').join('');
  const notes=rows.map(r=>r.notes).filter(Boolean).filter((v,i,a)=>a.indexOf(v)===i);
  const flags=[];
  if(metres===0&&cost>0)flags.push('Cost with zero metres');
  if(notes.join(' ').toLowerCase().match(/lost|fatigue|no access|breakdown|repair|standby/))flags.push('Operational note');
  if(hours>=12)flags.push('Long shift');
  document.getElementById('flags').innerHTML=flags.map(f=>'<span class="flag">'+esc(f)+'</span>').join('');
  document.getElementById('kpi-depth').textContent=metres.toFixed(2)+' m';
  document.getElementById('kpi-duration').textContent=hours.toFixed(2)+' h';
  document.getElementById('kpi-cost').textContent=cur(cost);
  document.getElementById('kpi-costm').textContent=metres>0?cur(cost/metres):'--';
  document.getElementById('kpi-activities').textContent=rows.length;
  document.getElementById('notes').innerHTML=notes.length?notes.map(n=>'<p>'+esc(n)+'</p>').join(''):'No notes recorded.';
  renderTimeline(rows,hours);
  document.getElementById('activity-body').innerHTML=rows.map(r=>{const depth=(r.metres_from||r.metres_to)?fmt(r.metres_from)+' - '+fmt(r.metres_to):fmt(r.total_metres);return '<tr><td>'+esc((r.time_from||'')+' - '+(r.time_to||''))+'</td><td class="code">'+esc(r.code||'')+'</td><td>'+esc(r.total_time||'')+'</td><td>'+depth+'</td><td>'+esc(r.notes||'')+'</td><td>'+cur(r.line_cost)+'</td></tr>';}).join('')||'<tr><td colspan="6" class="empty">No activities found</td></tr>';
  const relatedConsumables=consumables.filter(c=>!hole||c.hole_num===hole);
  document.getElementById('consumables-body').innerHTML=relatedConsumables.map(c=>'<tr><td>'+esc(c.consumable||c.type||'')+'</td><td>'+esc(c.quantity||'')+'</td><td>'+esc(c.unit||'')+'</td><td>'+cur(c.line_cost)+'</td></tr>').join('')||'<tr><td colspan="4" class="empty">No consumables recorded</td></tr>';
  const relatedCrew=crew.filter(c=>!hole||c.hole_num===hole);
  document.getElementById('crew-body').innerHTML=relatedCrew.map(c=>'<tr><td>'+esc(c.name||'')+'</td><td>'+esc(c.role||'')+'</td><td>'+esc(c.hours||'')+'</td></tr>').join('')||'<tr><td colspan="3" class="empty">No personnel recorded</td></tr>';
  const pdf=document.getElementById('pdf-btn');
  pdf.style.display=source?'inline-flex':'none';
  pdf.onclick=()=>{if(source)window.open(API+'/source_files/'+encodeURIComponent(source)+'?contractor='+encodeURIComponent(contractor),'_blank');};
}
function renderTimeline(rows,totalHours){
  const target=document.getElementById('timeline');
  const sorted=rows.slice().sort((a,b)=>(parseClockMinutes(a.time_from)||0)-(parseClockMinutes(b.time_from)||0));
  const starts=sorted.map(r=>parseClockMinutes(r.time_from)).filter(v=>v!=null);
  const ends=sorted.map(r=>{const explicit=parseClockMinutes(r.time_to);if(explicit!=null)return explicit;const start=parseClockMinutes(r.time_from);return start==null?null:start+Math.round(parseDurationHours(r.total_time)*60);}).filter(v=>v!=null);
  if(!starts.length||!ends.length){target.innerHTML='<div class="empty">No time data recorded for this report.</div>';return;}
  let min=Math.min(...starts),max=Math.max(...ends);
  if(max<=min)max=min+Math.max(60,Math.round(totalHours*60));
  const span=Math.max(60,max-min);
  const timelineWidth=Math.max(1400,Math.ceil(span/60)*170);
  const ticks=[];for(let t=Math.ceil(min/60)*60;t<=max;t+=60)ticks.push(t);
  const scale='<div class="timeline-scale">'+ticks.map(t=>'<span class="timeline-tick" style="left:'+(((t-min)/span)*100).toFixed(2)+'%">'+clockLabel(t)+'</span>').join('')+'</div>';
  const blocks=sorted.map(r=>{const start=parseClockMinutes(r.time_from);if(start==null)return '';const end=parseClockMinutes(r.time_to);const duration=parseDurationHours(r.total_time)*60;const finish=end!=null?end:start+Math.max(10,duration||30);const left=Math.max(0,((start-min)/span)*100);const width=Math.max(2,((finish-start)/span)*100);const cat=activityCategory(r);const color=CAT_COLORS[cat]||'#555e6b';const label=r.code||'No code';return '<div class="timeline-block" title="'+esc(label+': '+(r.notes||''))+'" style="left:'+left.toFixed(2)+'%;width:'+width.toFixed(2)+'%;background:'+color+';">'+esc(label)+'</div>';}).join('');
  target.innerHTML='<div class="timeline-tools"><button type="button" onclick="scrollTimelineBy(-520)">←</button><button type="button" onclick="scrollTimelineBy(520)">→</button></div>'
    +'<div class="timeline-scroll" id="timeline-scroll"><div class="timeline-inner" style="width:'+timelineWidth+'px;">'
    +scale+'<div class="timeline-track">'+blocks+'</div></div></div>';
}
function scrollTimelineBy(amount){
  const el=document.getElementById('timeline-scroll');
  if(el)el.scrollBy({left:amount,behavior:'smooth'});
}
loadReport();
</script>
</body>
</html>
